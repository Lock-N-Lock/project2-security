# --------------------------------------------------
# Security Events
# --------------------------------------------------

# 로그인 실패 급증
# 운영자 확인 대상
HighLoginFailureRate:
  description: "High login failure rate detected"

  category: security
  notify: true
  log: event.log

  mode: notify_only


# Rate Limit 발생
# 운영자 확인 대상
RateLimitTriggered:
  description: "Rate limit triggered"

  category: security
  notify: true
  log: event.log

  mode: notify_only


