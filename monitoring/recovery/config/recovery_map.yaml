# ==================================================
# Recovery Policy Configuration
# ==================================================
#
# mode
#
# auto_recovery
#   - Recovery Controller가 자동 복구 수행
#   - Verify 성공 시 복구 성공 로그 기록
#
# notify_only
#   - 자동 복구 수행 안 함
#   - 알림 및 Event History 기록만 수행
#
# category
#
# user_service
#   - 사용자 서비스 장애
#   - 알림 O / 자동복구 O / recovery.log
#
# maintenance
#   - 운영 컴포넌트 장애
#   - 알림 X / 자동복구 O / maintenance.log
#
# security
#   - 보안 이벤트
#   - 알림 O / 자동복구 X / event.log
#
# 참고
#   - PostgresDown 정책은 추후 결정
#   - Notify Only / Replica Promote 검토 중
#   - RecoveryControllerDown은 자기 자신을 복구할 수 없으므로 별도 보호 방식 검토
#
# ==================================================


# --------------------------------------------------
# User Service Recovery
# --------------------------------------------------

# App 서비스 장애
BankAppDown:
  description: "LockBank FastAPI container is down"

  category: user_service
  notify: true
  notify_success: true
  log: recovery.log

  mode: auto_recovery

  action: restart_container

  target: lb-fastapi

  command: "bash ./actions/docker_restart.sh lb-fastapi"

  verify:
    type: http
    url: "${APP_HEALTH_URL}"
    timeout: 5

  retry: 3
  verify_delay: 10
  retry_interval: 10
  cooldown: 10


# --------------------------------------------------
# Maintenance Recovery
# --------------------------------------------------

# 운영 컴포넌트
# Prometheus 장애 시 자동 복구
PrometheusDown:
  description: "Prometheus service is down"

  category: maintenance
  notify: false
  log: maintenance.log

  mode: auto_recovery

  action: restart_container

  target: lb-monitoring-prometheus

  command: "bash ./actions/docker_restart.sh lb-monitoring-prometheus"

  pre_verify:
    type: http
    url: "http://prometheus:9090/-/ready"
    timeout: 5

  verify:
    type: http
    url: "http://prometheus:9090/-/ready"
    timeout: 5

  retry: 3
  cooldown: 300


# 운영 컴포넌트
# Grafana 장애 시 자동 복구
