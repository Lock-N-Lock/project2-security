global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yaml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093
  
  - job_name: grafana
    static_configs:
      - targets:
          - grafana:3000

  - job_name: nginx-exporter
    static_configs:
      - targets:
          - nginx-exporter:9113
  # ── 준한 추가 ──
  - job_name: app-nodes
    http_sd_configs:
      - url: http://tailscale-sd:9999/app-targets
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__meta_ts_hostname]
        target_label: ts_host        # ★ instance(ip:port) 유지, hostname은 별도 라벨

  - job_name: db-node
    http_sd_configs:
      - url: http://tailscale-sd:9999/db-targets
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__meta_ts_hostname]
        target_label: ts_host