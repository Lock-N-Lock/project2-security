global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yaml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093
  
  - job_name: grafana
    static_configs:
      - targets:
          - grafana:3000

  - job_name: nginx-exporter
    static_configs:
      - targets:
          - nginx-exporter:9113

  - job_name: recovery
    static_configs:
      - targets:
          - recovery:8000
