groups:
  - name: db
    rules:
      - alert: DBDown
        expr: up{job="db-node"} == 0
        for: 1m
        labels: { severity: critical }
        annotations: { summary: "DB(lb-db) 응답 없음 (scrape 실패 1분)" }
      - alert: DBHighCPU
        expr: 100 - (avg by(instance)(rate(node_cpu_seconds_total{job="db-node",mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels: { severity: warning }
        annotations: { summary: "DB CPU 85% 초과" }
      - alert: DBHighMemory
        expr: (1 - node_memory_MemAvailable_bytes{job="db-node"} / node_memory_MemTotal_bytes{job="db-node"}) * 100 > 85
        for: 5m
        labels: { severity: warning }
        annotations: { summary: "DB 메모리 85% 초과" }