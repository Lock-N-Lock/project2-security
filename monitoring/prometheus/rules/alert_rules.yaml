groups:
  - name: monitoring

    rules:
      # ==================================================
      # Application Alerts
      # AWS App ASG 인스턴스 scrape 검증 후 활성화
      #
      # BankAppDown:
      # - LockBank FastAPI /metrics endpoint 장애
      # - app-nodes job의 8080 포트 scrape 상태로 검증
      # - Alertmanager를 통해 Telegram 알림을 전송하고,
      #   Recovery Controller가 복구를 시도한다.
      #
      # AppNodeExporterDown:
      # - App 서버 node_exporter 장애
      # - 서버 리소스 메트릭 수집 불가 상태를 탐지한다.
      # - FastAPI 앱 장애와는 복구 대상이 다르므로 BankAppDown과 분리한다.
      # ==================================================

      - alert: BankAppDown
        expr: up{job="app-nodes", instance=~".*:8080"} == 0
        for: 30s
        labels:
          severity: critical
          category: service
          service: lockbank-app
        annotations:
          summary: LockBank App Down
          description: LockBank application target is down.

      # - alert: AppNodeExporterDown
      #   expr: up{job="app-nodes", instance=~".*:9100"} == 0
      #   for: 30s
      #   labels:
      #     severity: warning
      #     category: exporter
      #     service: app-node-exporter
      #   annotations:
      #     summary: App Node Exporter Down
      #     description: App server node_exporter metrics endpoint is down.

      # ==================================================
      # Database Alerts
      # DB 노드 / PostgreSQL Exporter scrape 검증 후 활성화
      #
      # PostgresDown:
      # - PostgreSQL 서비스 또는 PostgreSQL Exporter 기준 DB 상태 장애
      # - DB 장애는 사용자 서비스 영향 가능성이 있으므로 critical로 분류한다.
      #
      # PostgresExporterDown:
      # - PostgreSQL Exporter 자체 장애
      # - DB 장애와 구분하기 위해 exporter 장애로 분리한다.
      # ==================================================

      # - alert: PostgresDown
      #   expr: pg_up{job="db-node", instance=~".*:9187"} == 0
      #   for: 30s
      #   labels:
      #     severity: critical
      #     category: database
      #     service: postgres
      #   annotations:
      #     summary: PostgreSQL Down
      #     description: PostgreSQL database is not accepting connections.

      # - alert: PostgresExporterDown
      #   expr: up{job="db-node", instance=~".*:9187"} == 0
      #   for: 1m
      #   labels:
      #     severity: warning
      #     category: exporter
      #     service: postgres-exporter
      #   annotations:
      #     summary: PostgreSQL Exporter Down
      #     description: PostgreSQL exporter metrics endpoint is down.

      # - alert: DBNodeExporterDown
      #   expr: up{job="db-node", instance=~".*:9100"} == 0
      #   for: 1m
      #   labels:
      #     severity: warning
      #     category: exporter
      #     service: db-node-exporter
      #   annotations:
      #     summary: DB Node Exporter Down
      #     description: DB server node_exporter metrics endpoint is down.

      # ==================================================
      # Database Alerts
      # DB 노드 / PostgreSQL Exporter scrape 검증 후 활성화

      # DBHighCPU / DBHighMemory:
      # - db-node의 node_exporter 메트릭 수집 시 활성화
      #
      # Recovery Controller는 온프레에서 동작하므로
      # AWS DB 복구는 원격 실행 방식(Remote Adapter) 확정 후 활성화한다.
      #
      # 제외 범위:
      # - Replica Promote
      # - Failover
      # - DB 연결 정보 전환
      # ==================================================

      # - alert: DBHighCPU
      #   expr: 100 - (avg by(instance)(rate(node_cpu_seconds_total{job="db-node", mode="idle"}[5m])) * 100) > 85
      #   for: 5m
      #   labels:
      #     severity: warning
      #     category: database
      #     service: db-node
      #   annotations:
      #     summary: DB CPU 85% 초과
      #     description: DB node CPU usage is over 85% for 5 minutes.

      # - alert: DBHighMemory
      #   expr: (1 - node_memory_MemAvailable_bytes{job="db-node"} / node_memory_MemTotal_bytes{job="db-node"}) * 100 > 85
      #   for: 5m
      #   labels:
      #     severity: warning
      #     category: database
      #     service: db-node
      #   annotations:
      #     summary: DB 메모리 85% 초과
      #     description: DB node memory usage is over 85% for 5 minutes.

      # ==================================================
      # Maintenance Alerts
      # 현재 Prometheus scrape 대상 기준으로 활성화
      # 운영 컴포넌트 장애는 Alertmanager를 통해 Telegram 알림을 전송하고,
      # Recovery Controller가 복구를 시도한다.
      # 복구 결과는 maintenance.log에 기록한다.
      # ==================================================

      - alert: PrometheusDown
        expr: up{job="prometheus"} == 0
        for: 30s
        labels:
          severity: warning
          category: maintenance
          service: prometheus
        annotations:
          summary: Prometheus Down
          description: Prometheus scrape target is down.

      - alert: AlertmanagerDown
        expr: up{job="alertmanager"} == 0
        for: 30s
        labels:
          severity: warning
          category: maintenance
          service: alertmanager
        annotations:
          summary: Alertmanager Down
          description: Alertmanager scrape target is down.

      - alert: GrafanaDown
        expr: up{job="grafana"} == 0
        for: 30s
        labels:
          severity: warning
          category: maintenance
          service: grafana
        annotations:
          summary: Grafana Down
          description: Grafana scrape target is down.
      
      - alert: NginxExporterDown
        expr: up{job="nginx-exporter"} == 0
        for: 30s
        labels:
          severity: warning
          category: maintenance
          service: nginx-exporter
        annotations:
          summary: Nginx Exporter Down
          description: Nginx Exporter scrape target is down.

      # ==================================================
      # Infrastructure Events (CloudWatch Alarm)
      # ==================================================

      # NOTE:
      # 아래 항목은 Prometheus Alert Rule이 아니라
      # Terraform cloudwatch.tf에 정의된 AWS CloudWatch Alarm 기반 이벤트이다.
      #
      # D Track에서는 Grafana CloudWatch datasource를 통해
      # 해당 Alarm 상태를 Dashboard / Alert History에 반영하는 구조를 준비한다.
      #
      # 현재 Recovery Controller의 action 대상은 아니며,
      # 인프라 상태 확인 및 운영 이벤트 이력 용도로 사용한다.
      #
      # Terraform source:
      # - infra/terraform/cloudwatch.tf
      #
      # Expected CloudWatch Events:
      # - ALB5xxHigh
      # - TargetGroupUnhealthy
      # - TargetGroupUnhealthyGreen
      # - ASGScaleOut

